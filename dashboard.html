<!DOCTYPE html>
<html lang="mr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Fuel Performance Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

:root{
--primary:#1e40af;
--bg:#f1f5f9;
--card:#ffffff;
--border:#e5e7eb;
}

*{
box-sizing:border-box;
}

body{
margin:0;
font-family:"Noto Sans Devanagari",system-ui,sans-serif;
background:var(--bg);
padding:15px 20px 40px;
}

/* HEADER */

.gov-header{
text-align:center;
margin-bottom:25px;
padding-bottom:15px;
border-bottom:3px solid var(--primary);
background:white;
border-radius:12px;
box-shadow:0 6px 18px rgba(0,0,0,0.05);
padding-top:15px;
}

.gov-logos{
display:flex;
justify-content:center;
align-items:center;
gap:20px;
margin-bottom:15px;
}

.center-logo{width:85px;}
.side-logo{width:70px;}

.gov-subtitle{
font-size:16px;
margin-bottom:6px;
}

.gov-title{
font-size:24px;
font-weight:700;
color:var(--primary);
}

/* CONTAINER */

.container{
max-width:1200px;
margin:auto;
}

/* FILTERS */

.filters{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
gap:12px;
margin-bottom:20px;
align-items:end;
}

select,input{
padding:9px;
font-size:14px;
border-radius:8px;
border:1px solid var(--border);
}

button{
padding:10px;
background:var(--primary);
color:white;
border:none;
border-radius:8px;
font-weight:600;
cursor:pointer;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:12px;
margin-bottom:20px;
}

.card{
background:var(--card);
padding:18px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
text-align:center;
}

.card h3{
margin:5px 0;
font-size:14px;
color:#64748b;
}

.card p{
font-size:24px;
font-weight:bold;
margin-top:5px;
}

/* STATUS */

.good{color:#16a34a;}
.warn{color:#eab308;}
.bad{color:#dc2626;}

/* CHART */

.chart-box{
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 2px 6px rgba(0,0,0,0.08);
}

/* MOBILE */

@media(max-width:600px){

.center-logo{width:75px;}
.side-logo{width:65px;}
.gov-title{font-size:20px;}

}

</style>
</head>

<body>

<!-- HEADER -->

<div class="gov-header">

<div class="gov-logos">
<img src="left-logo.png" class="side-logo">
<img src="main-logo.png" class="center-logo">
<img src="right-logo.png" class="side-logo">
</div>

<div class="gov-subtitle">
मा. कार्यकारी अभियंता यांत्रिकी विभाग (को.प्र), अलोरे अंतर्गत
</div>

<div class="gov-title">
यांत्रिकी विभाग मातीकाम माहिती प्रणाली
</div>

</div>

<div class="container">

<h2>Fuel Performance Dashboard</h2>

<!-- FILTERS -->

<div class="filters">

<select id="subdivision"></select>

<select id="category"></select>

<select id="machine"></select>

<input type="date" id="fromDate">

<input type="date" id="toDate">

<button onclick="loadPerformance()">Load</button>

</div>

<!-- CARDS -->

<div class="cards">

<div class="card">
<h3>Expected Avg</h3>
<p id="expected">-</p>
</div>

<div class="card">
<h3>Actual Avg</h3>
<p id="actual">-</p>
</div>

<div class="card">
<h3>Total Hours / KM</h3>
<p id="hours">-</p>
</div>

<div class="card">
<h3>Total Diesel</h3>
<p id="diesel">-</p>
</div>

<div class="card">
<h3>Status</h3>
<p id="status">-</p>
</div>

</div>

<!-- CHART -->

<div class="chart-box">

<canvas id="effChart"></canvas>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbzOhvYrDFrXe6vo7hjeMkuFH0GJ2exdLNfzy9ZyPASiCu-JcmXY7yHTxixNq29tACB5Jg/exec";

let machines=[];
let subs=[];
let chart;

/* LOAD CONFIG */

async function loadConfig(){

const r=await fetch(API+"?mode=config_all");
const data=await r.json();

machines=data.machines;
subs=data.subdivisions;

const subSel=document.getElementById("subdivision");

subs.forEach(s=>{

const op=document.createElement("option");

op.value=s["Subdivision Code"];
op.textContent=s["Subdivision Name"];

subSel.appendChild(op);

});

loadCategory();
setDefaultDates();

}

/* DEFAULT DATE */

function setDefaultDates(){

const today=new Date();

const first=new Date(today.getFullYear(),today.getMonth(),1);

document.getElementById("fromDate").value=
first.toISOString().split("T")[0];

document.getElementById("toDate").value=
today.toISOString().split("T")[0];

}

/* CATEGORY */

function loadCategory(){

const catSel=document.getElementById("category");
catSel.innerHTML="";

["Machine","Vehicle"].forEach(c=>{

const op=document.createElement("option");

op.value=c;
op.textContent=c;

catSel.appendChild(op);

});

loadMachines();

}

/* MACHINE LIST */

function loadMachines(){

const sub=document.getElementById("subdivision").value;
const cat=document.getElementById("category").value;

const mSel=document.getElementById("machine");
mSel.innerHTML="";

machines
.filter(m=>m["Subdivision Code"]===sub && m["Category"]===cat)
.forEach(m=>{

const op=document.createElement("option");

op.value=m["Machine Name"];
op.textContent=m["Machine Name"];

mSel.appendChild(op);

});

}

/* PERFORMANCE */

async function loadPerformance(){

const sub=document.getElementById("subdivision").value;
const machine=document.getElementById("machine").value;

const fromDate=document.getElementById("fromDate").value;
const toDate=document.getElementById("toDate").value;

if(!fromDate || !toDate){

alert("Date range select करा");
return;

}

const r=await fetch(
API+"?mode=fuel_dashboard&subdivision="+sub+
"&from="+fromDate+
"&to="+toDate
);

const data=await r.json();

const row=data.find(d=>d.machine===machine);

if(!row)return;

const hours=row.hours;
const diesel=row.diesel;
const actual=row.actual;
const expected=row.expected;

document.getElementById("expected").innerText=expected.toFixed(2);
document.getElementById("actual").innerText=actual.toFixed(2);
document.getElementById("hours").innerText=hours.toFixed(1);
document.getElementById("diesel").innerText=diesel.toFixed(1);

/* STATUS */

let status="good";
let txt="Good";

if(row.category==="Machine"){

if(actual>expected*1.1){status="bad";txt="High";}
else if(actual>expected){status="warn";txt="Slight High";}

}else{

if(actual<expected*0.9){status="bad";txt="Poor";}
else if(actual<expected){status="warn";txt="Low";}

}

const st=document.getElementById("status");

st.innerText=txt;
st.className=status;

/* CHART */

if(chart){
chart.destroy();
}

chart=new Chart(document.getElementById("effChart"),{

type:"bar",

data:{
labels:["Expected","Actual"],
datasets:[{
label:"Fuel Efficiency",
data:[expected,actual],
borderWidth:2
}]
},

options:{
responsive:true,
plugins:{
legend:{display:false}
}
}

});

}

/* EVENTS */

document.getElementById("subdivision").onchange=loadMachines;
document.getElementById("category").onchange=loadMachines;

loadConfig();

</script>

</body>
</html>
