<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Dashboard | यांत्रिकी मातीकाम माहिती प्रणाली</title>

<style>
:root{
  --primary:#1e40af;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --danger:#b91c1c;
  --success:#059669;
  --secondary:#6b7280;
}

body{
  margin:0;
  font-family:"Noto Sans Devanagari", system-ui, sans-serif;
  background:var(--bg);
  padding:15px 20px 40px;
}

/* HEADER */
.gov-header{
  text-align:center;
  margin-bottom:25px;
  padding-bottom:15px;
  border-bottom:3px solid var(--primary);
  background:white;
  border-radius:12px;
  box-shadow:0 6px 18px rgba(0,0,0,0.05);
  padding-top:15px;
}

.gov-logos{
  display:flex;
  justify-content:center;
  align-items:center;
  gap:20px;
  margin-bottom:15px;
}

.center-logo{ width:85px; }
.side-logo{ width:70px; }

.gov-title{
  font-size:24px;
  font-weight:700;
  color:var(--primary);
}

/* CARD */

.container{
  max-width:750px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

.subdivision-name{
  font-size:20px;
  font-weight:700;
  color:var(--success);
  margin-bottom:8px;
  text-align:center;
}

.role-text{
  text-align:center;
  font-size:14px;
  color:var(--secondary);
  margin-bottom:20px;
}

.report-section{
  margin-top:20px;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  background:var(--primary);
  color:white;
  transition:0.2s;
}

button:hover{
  opacity:0.9;
}

button.logout{
  background:var(--danger);
  margin-top:25px;
}

.loading{
  text-align:center;
  font-size:14px;
  color:var(--secondary);
}

</style>
</head>
<body>

<div class="gov-header">
  <div class="gov-logos">
    <img src="left-logo.png" class="side-logo">
    <img src="main-logo.png" class="center-logo">
    <img src="right-logo.png" class="side-logo">
  </div>
  <div class="gov-title">
    यांत्रिकी मातीकाम माहिती प्रणाली
  </div>
</div>

<div class="container">

  <div class="subdivision-name" id="subdivisionName"></div>
  <div class="role-text" id="roleText"></div>

  <div class="report-section">
    <h3>📥 Reports Download</h3>

    <button onclick="downloadFullReport()">
      📊 पूर्ण अहवाल डाउनलोड करा
    </button>

    <button onclick="downloadTodayReport()">
      📅 आजचा अहवाल डाउनलोड करा
    </button>
  </div>

  <button class="logout" onclick="logout()">
    🚪 Logout
  </button>

  <div class="loading" id="loadingText"></div>

</div>

<script>

const API_URL = "PASTE_YOUR_APPS_SCRIPT_URL_HERE";

/* ============================= */
/* SECURITY + PAGE LOAD */
/* ============================= */

document.addEventListener("DOMContentLoaded", function(){

  const token = localStorage.getItem("token");
  const subdivisionName = localStorage.getItem("subdivisionName");
  const subdivisionCode = localStorage.getItem("subdivisionCode");
  const role = localStorage.getItem("role");

  if(!token || !subdivisionCode || !subdivisionName){
    window.location.href = "login.html";
    return;
  }

  document.getElementById("subdivisionName").innerText =
    " उपविभाग: " + subdivisionName;

  document.getElementById("roleText").innerText =
    "भूमिका: " + role;

});

/* ============================= */
/* REPORT FUNCTIONS */
/* ============================= */

function downloadFullReport(){

  const token = localStorage.getItem("token");
  const subdivisionCode = localStorage.getItem("subdivisionCode");

  document.getElementById("loadingText").innerText = "⏳ अहवाल तयार होत आहे...";

  window.open(
    API_URL + "?mode=dashboard&subdivision=" + subdivisionCode + "&token=" + token,
    "_blank"
  );

  setTimeout(()=>{
    document.getElementById("loadingText").innerText = "";
  },2000);
}

function downloadTodayReport(){
  alert("Future enhancement: Today report filter");
}

/* ============================= */
/* LOGOUT */
/* ============================= */

function logout(){

  if(confirm("तुम्हाला लॉगआउट करायचे आहे का?")){

    localStorage.removeItem("token");
    localStorage.removeItem("subdivisionCode");
    localStorage.removeItem("subdivisionName");
    localStorage.removeItem("role");

    window.location.href = "login.html";
  }
}

</script>

</body>
</html>
