<!DOCTYPE html>
<html lang="mr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>यांत्रिकी मातीकाम माहिती प्रणाली</title>

<style>

:root{
  --primary:#1e40af;
  --bg:#f3f4f6;
  --card:#ffffff;
  --border:#e5e7eb;
  --danger:#b91c1c;
  --success:#059669;
  --secondary:#6b7280;
}

*{box-sizing:border-box;}

body{
  margin:0;
  font-family:"Noto Sans Devanagari", system-ui, sans-serif;
  background:var(--bg);
  padding:20px;
}

.container{
  max-width:750px;
  margin:auto;
  background:var(--card);
  padding:25px;
  border-radius:14px;
  box-shadow:0 10px 25px rgba(0,0,0,0.05);
}

h2{
  text-align:center;
  color:var(--primary);
  margin-bottom:5px;
}

.subtitle{
  text-align:center;
  color:var(--danger);
  font-weight:600;
  margin-bottom:25px;
}

.section{
  margin-bottom:18px;
}

label{
  display:block;
  font-weight:600;
  margin-bottom:6px;
}

input, select{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:1px solid var(--border);
  font-size:14px;
  transition:0.2s;
}

input:focus, select:focus{
  border-color:var(--primary);
  outline:none;
}

.readonly{
  background:#f9fafb;
}

button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:8px;
  font-weight:600;
  cursor:pointer;
  margin-top:10px;
  transition:0.2s;
}

.btn-primary{background:var(--primary);color:white;}
.btn-primary:hover{opacity:0.9;}

.btn-secondary{background:var(--secondary);color:white;}
.btn-success{background:var(--success);color:white;}

.warning{
  margin-top:15px;
  color:var(--danger);
  font-weight:600;
  text-align:center;
}

@media(max-width:600px){
  .container{padding:18px;}
}

</style>
</head>

<body>

<div class="container">

<h2>🚜 यांत्रिकी उपविभाग क्र १, अलोरे</h2>
<div class="subtitle">सर्व माहिती मराठीत नीट पणे भरावी</div>

<form id="mainForm">

<!-- DATE -->
<div class="section">
<label>📅 आजचा दिनांक</label>
<input type="date" id="workDate" required>
</div>

<!-- SUBDIVISION -->
<div class="section">
<label>🏢 उपविभाग</label>
<select id="subdivision" required>
<option value="">उपविभाग निवडा...</option>
</select>
</div>

<!-- WORK TYPE -->
<div class="section">
<label>🎛 कामाचा प्रकार</label>
<select id="workType" required>
<option value="">कामाचा प्रकार निवडा...</option>
</select>
</div>

<!-- PROJECT -->
<div class="section">
<label>🏗 प्रकल्पाचे नाव</label>
<select id="projectName" required>
<option value="">प्रकल्पाचे नाव निवडा...</option>
</select>
</div>

<!-- MACHINE TYPE -->
<div class="section">
<label>⚙️ सयंत्राचा प्रकार</label>
<select id="machineType" required>
<option value="">सयंत्राचा प्रकार निवडा...</option>
</select>
</div>

<!-- DRIVER -->
<div class="section">
<label>👷 चालकाचे नाव</label>
<select id="staffName" required>
<option value="">चालक निवडा...</option>
</select>
</div>

<!-- MACHINE -->
<div class="section">
<label>📋 सयंत्राचे नाव</label>
<select id="machineName" required>
<option value="">सयंत्र निवडा...</option>
</select>
</div>

<!-- DIESEL -->
<div class="section">
<label>⛽ आज किती डिझेल भरले (लिटर)</label>
<input type="number" id="dieselQty" required step="0.1" min="0" placeholder="उदा. 25.5">
</div>

<div class="section">
<label>🕒 डिझेल भरण्याची वेळ</label>
<input type="time" id="dieselTime">
</div>

<div class="section">
<label>📟 डिझेल भरण्यावेळी डॅशबोर्ड रिडींग</label>
<input type="number" id="dieselReading">
</div>

<!-- MACHINE COMMON SECTION -->
<div id="machineSection">

<div class="section">
<label>▶️ काम सुरू करतानाचे डॅशबोर्ड रिडींग</label>
<input type="number" id="startReading" min="0">
</div>

<div class="section">
<label>⏹ काम थांबवतानाचे डॅशबोर्ड रिडींग</label>
<input type="number" id="endReading" min="0">
</div>

<div class="section">
<label>⚡ डॅशबोर्ड नुसार आजचे एकूण तास / किमी</label>
<input type="number" id="totalHoursReading" class="readonly" readonly>
</div>

<div class="section">
<label>🌅 पहिली शिफ्ट सुरू करताना ची वेळ</label>
<input type="time" id="shift1Start">
</div>

<div class="section">
<label>🌇 पहिली शिफ्ट थांबवितानाची वेळ</label>
<input type="time" id="shift1End">
</div>

<div class="section">
<label>🌙 दुसरी शिफ्ट सुरू करताना ची वेळ</label>
<input type="time" id="shift2Start">
</div>

<div class="section">
<label>🌌 दुसरी शिफ्ट थांबवितानाची वेळ</label>
<input type="time" id="shift2End">
</div>

<div class="section">
<label>🕓 शिफ्टनुसार एकूण तास</label>
<input type="number" id="totalShiftHours" class="readonly" readonly>
</div>

</div>

<!-- VEHICLE EXTRA SECTION -->
<div id="vehicleSection" style="display:none;">

<div class="section">
<label>🔁 एकूण ट्रिप्स</label>
<input type="number" id="tripCount" min="0">
</div>

<div class="section">
<label>📍 या ठिकाणापासून ते त्या ठिकाणापर्यंत</label>
<input type="text" id="locationFromTo">
</div>

</div>

<button type="submit" class="btn-primary">✅ सबमिट करा</button>
<button type="reset" class="btn-secondary">♻️ रीसेट</button>
<button type="button" class="btn-success">📊 Dashboard पाहा</button>

<div class="warning">
⚠️ सर्व माहिती भरून 'सबमिट करा' दाबा.
</div>

</form>

</div>

<script src="config.js"></script>
<script src="app.js"></script>

</body>
</html>
